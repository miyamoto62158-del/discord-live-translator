<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Live Translator</title>
    <meta name="description" content="Discordボイスチャンネルのリアルタイム文字起こし＆翻訳ダッシュボード">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ヘッダー -->
    <header id="header">
        <div class="header-left">
            <div class="logo">
                <span class="logo-icon">🌐</span>
                <h1>Discord Live Translator</h1>
            </div>
            <div id="connection-status" class="status-badge disconnected">
                <span class="status-dot"></span>
                <span class="status-text">切断中</span>
            </div>
            <div class="voice-controls">
                <button id="join-btn" class="btn-join" title="Botをボイスチャンネルに参加させる">🎙️ 参加</button>
                <button id="leave-btn" class="btn-leave" title="Botをボイスチャンネルから退出させる" style="display:none">👋 退出</button>
            </div>
        </div>
        <div class="header-right">
            <div class="lang-selector" style="margin-right: 15px;">
                <label for="detect-lang">音声言語:</label>
                <select id="detect-lang">
                    <option value="auto">🌐 自動検出</option>
                    <option value="ja">🇯🇵 日本語</option>
                    <option value="en">🇺🇸 英語</option>
                    <option value="zh">🇨🇳 中国語</option>
                    <option value="ko">🇰🇷 韓国語</option>
                    <option value="id">🇮🇩 インドネシア語</option>
                    <option value="yue">🇭🇰 広東語</option>
                </select>
            </div>
            <div class="lang-selector">
                <label for="target-lang">翻訳先:</label>
                <select id="target-lang">
                    <option value="JA">🇯🇵 日本語</option>
                    <option value="EN-US">🇺🇸 英語</option>
                    <option value="KO">🇰🇷 韓国語</option>
                    <option value="ZH-HANS">🇨🇳 中国語</option>
                    <option value="ID">🇮🇩 インドネシア語</option>
                    <option value="ES">🇪🇸 スペイン語</option>
                    <option value="FR">🇫🇷 フランス語</option>
                    <option value="DE">🇩🇪 ドイツ語</option>
                </select>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main id="transcript-container">
        <!-- 初期メッセージ -->
        <div id="welcome-message" class="welcome">
            <div class="welcome-icon">🎙️</div>
            <h2>準備完了！</h2>
            <p>下のボタンをクリックして、Botをボイスチャンネルに参加させてください。</p>
            <button id="join-btn-welcome" class="btn-join-large">🎙️ Botを参加させる</button>
            <p class="welcome-note">※ 先にDiscordのボイスチャンネルに入っておいてください</p>

            <div class="command-help">
                <h3>📋 コマンド一覧</h3>
                <div class="command-list">
                    <div class="command-item">
                        <span class="cmd-name">🎙️ 参加</span>
                        <span class="cmd-desc">Botをあなたがいるボイスチャンネルに参加させます</span>
                    </div>
                    <div class="command-item">
                        <span class="cmd-name">👋 退出</span>
                        <span class="cmd-desc">Botをボイスチャンネルから退出させます</span>
                    </div>
                    <div class="command-item">
                        <span class="cmd-name">🌐 翻訳先</span>
                        <span class="cmd-desc">右上のセレクタで翻訳先言語を切替えます（リアルタイム反映）</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 発言カードがここに追加される -->
    </main>

    <!-- フッター -->
    <footer id="footer">
        <div class="footer-info">
            <span id="message-count">0 件の発言</span>
            <span class="separator">|</span>
            <span id="last-update">最終更新: --:--:--</span>
            <span class="separator">|</span>
            <span id="deepl-usage">DeepL使用量: 0 / 1000000 (0.0%)</span>
        </div>
        <div class="footer-right">
            <button id="auto-scroll-btn" class="btn-auto-scroll active" title="最新の発言への自動追従">
                📌 自動追従: ON
            </button>
            <button id="clear-btn" class="btn-clear" title="履歴をクリア">🗑️ クリア</button>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
